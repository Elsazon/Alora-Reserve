<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ALORA Service Console</title>

<style>

body{
background:#0e1511;
color:#f4f1ea;
font-family:Inter,system-ui;
margin:0;
padding:30px;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
background:#121a16;
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
padding:20px;
margin-bottom:25px;
}

.controls{
display:flex;
gap:20px;
margin-top:10px;
}

select,input{
background:#0e1511;
border:1px solid rgba(255,255,255,.12);
color:white;
padding:8px;
border-radius:8px;
}

.stats{
margin-top:15px;
display:flex;
gap:25px;
font-size:14px;
}

.layout{
display:grid;
grid-template-columns:1fr 420px;
gap:25px;
}

.resList{
background:#121a16;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
padding:20px;
}

.resCard{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.resCard:last-child{
border-bottom:none;
}

.statusDot{
width:10px;
height:10px;
border-radius:50%;
margin-right:10px;
}

.pending{
background:#FFC107;
}

.arrived{
background:#4CAF50;
}

button{
background:#c26a4a;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.detail{
background:#121a16;
border-radius:14px;
border:1px solid rgba(255,255,255,.08);
padding:20px;
}

.cover{
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,.05);
}

.note{
margin-top:15px;
background:#0e1511;
padding:12px;
border-radius:8px;
font-size:14px;
}
.resCard{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid rgba(255,255,255,.06);
font-size:15px;
}

.resCard:hover{
background:#18221c;
}

button{
background:#c26a4a;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-weight:600;
transition:.2s;
}

button:hover{
background:#e07c58;
}
</style>

</head>

<body>

<div class="container">

<h2>ALORA • Service Console</h2>

<div class="header">

<div class="controls">

<label>Función</label>
<select id="funcion"></select>

<label>Buscar</label>
<input id="buscar" placeholder="Cliente">

</div>

<div class="stats">

<div>Covers: <span id="coversTotal">0</span></div>
<div>Llegaron: <span id="coversArrived">0</span></div>
<div>Pendientes: <span id="coversPending">0</span></div>

</div>

</div>

<div class="layout">

<div class="resList" id="reservas"></div>

<div class="detail" id="detalle">

Selecciona una reserva

</div>

</div>

</div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbzspu_BRdOM5la7rjDmx9dXmhcg7701qKelHTYcXQ23zRrCSLFuIG78LvUmXEV081ld/exec";
const SHARED_SECRET="demo123";

const FUNCIONES=[
"Función 1","Función 2","Función 3","Función 4",
"Función 5","Función 6","Función 7","Función 8"
];

const $=id=>document.getElementById(id);

function estadoServicio(horaReserva,llego){

if(llego) return "arrived";

const now = new Date();

const [h,m] = horaReserva.replace(" PM","").replace(" AM","").split(":");

let hour = parseInt(h);
const min = parseInt(m);

if(horaReserva.includes("PM") && hour !== 12) hour += 12;
if(horaReserva.includes("AM") && hour === 12) hour = 0;

const reserva = new Date();
reserva.setHours(hour,min,0,0);

if(now > reserva){
return "late";
}

return "pending";

}
  
let HOST_CACHE = {};
  
function fillSelect(el,list){

el.innerHTML="";

list.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
el.appendChild(o);
});

}

async function loadReservas(){

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"host_list",
funcion:$("funcion").value,
secret:SHARED_SECRET
})
});

const data=await res.json();

renderReservas(data.reservas||[]);

}

function renderReservas(list){

HOST_CACHE = {};

const container = $("reservas");
container.innerHTML = "";

let covers = 0;

list.forEach(r=>{

covers += r.personas;

/* guardar en cache */
HOST_CACHE[r.id] = r;

const estado = estadoServicio(r.hora,r.llego);

let dot = "🟡";

if(estado === "arrived") dot = "🟢";
if(estado === "late") dot = "🔴";

const card = document.createElement("div");
card.className = "resCard";

card.innerHTML = `

<div>
${dot} <strong>${r.hora}</strong>  
${r.cliente} (${r.personas})
</div>

<div>
Mesa ${r.mesa || "—"}

<button onclick="arrive('${r.id}')">Llegó</button>
<button onclick="verDetalle('${r.id}')">Editar</button>
</div>

`;

container.appendChild(card);

});

$("coversTotal").textContent = covers;

}

async function arrive(id){

await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"host_arrive",
id:id,
secret:SHARED_SECRET
})
});

loadReservas();

}

async function verDetalle(id){

let r = HOST_CACHE[id];

/* si no tiene covers aún → traerlos del backend */

if(!r || !r.covers){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"host_get",
id:id,
secret:SHARED_SECRET
})
});

const data = await res.json();

r = data.reserva;

/* guardarlo en cache */

HOST_CACHE[id] = r;

}

/* render detalle */

$("detalle").innerHTML=`

<h3>${r.cliente}</h3>

Teléfono: ${r.telefono}<br>
Personas: ${r.personas}

<h4>COVERS</h4>

${r.covers.map(c=>`
<div class="cover">
<strong>${c.nombre}</strong><br>
Aperitivo: ${c.aperitivo || "-"}<br>
Principal: ${c.principal || "-"}<br>
Postre: ${c.postre || "-"}<br>
Proteína: ${c.proteina || "-"}
</div>
`).join("")}

${r.notas ? `
<h4>Notas</h4>
<div class="note">${r.notas}</div>
` : ""}

`;

}

document.addEventListener("DOMContentLoaded",()=>{

fillSelect($("funcion"),FUNCIONES);

$("funcion").addEventListener("change",loadReservas);

loadReservas();

});

</script>

</body>
</html>
