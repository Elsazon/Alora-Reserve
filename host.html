<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ALORA Host Control</title>

<style>

body{
background:#0e1511;
color:#f4f1ea;
font-family:Inter,system-ui;
margin:0;
padding:30px;
}

.container{
max-width:1300px;
margin:auto;
}

.header{
border:1px solid rgba(255,255,255,.08);
border-radius:14px;
padding:20px;
margin-bottom:25px;
}

.controls{
display:flex;
gap:20px;
align-items:center;
margin-top:10px;
}

.controls select,
.controls input{

padding:8px;
border-radius:8px;
background:#121a16;
color:white;
border:1px solid rgba(255,255,255,.15);

}

.stats{
display:flex;
gap:25px;
margin-top:15px;
font-size:14px;
opacity:.9;
}

.layout{
display:grid;
grid-template-columns:1fr 400px;
gap:25px;
}

.resList{
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:15px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.05);
}

.row:last-child{
border-bottom:none;
}

button{
background:#c26a4a;
border:none;
padding:6px 10px;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.detail{
border:1px solid rgba(255,255,255,.08);
border-radius:12px;
padding:18px;
}

.cover{
padding:6px 0;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,.05);
}

.cover:last-child{
border-bottom:none;
}

</style>

</head>

<body>

<div class="container">

<h2>ALORA • Host Control Panel</h2>

<div class="header">

<div class="controls">

<label>Función</label>
<select id="funcion"></select>

<label>Hora</label>
<select id="hora">
<option value="">Todas</option>
</select>

<label>Buscar</label>
<input id="buscar" placeholder="Cliente">

</div>

<div class="stats">

<div>Covers: <span id="coversTotal">0</span></div>
<div>Llegaron: <span id="coversArrived">0</span></div>
<div>Pendientes: <span id="coversPending">0</span></div>

</div>

</div>

<div class="layout">

<div class="resList" id="reservas"></div>

<div class="detail" id="detalle">

Selecciona una reserva

</div>

</div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzdKNVULHVMBPz14LXn0wz2-D--FaU_s6fQQZeDGxHpnAR8WllvQbUcexwRM4rCKfzO/exec";
const SHARED_SECRET = "demo123";

const FUNCIONES = [
"Función 1","Función 2","Función 3","Función 4",
"Función 5","Función 6","Función 7","Función 8"
];

const $ = id => document.getElementById(id);

function fillSelect(select, options){

select.innerHTML="";

options.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
select.appendChild(o);
});

}

async function loadReservas(){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"host_list",
funcion:$("funcion").value,
secret:SHARED_SECRET
})
});

const data=await res.json();

renderReservas(data.reservas || []);

}

function renderReservas(list){

const container=$("reservas");
container.innerHTML="";

let covers=0;

list.forEach(r=>{

covers+=r.personas;

const row=document.createElement("div");
row.className="row";

row.innerHTML=`

<div>

<strong>${r.hora}</strong>  
${r.cliente} (${r.personas})

</div>

<div>

Mesa ${r.mesa || "—"}

<button onclick="arrive('${r.id}')">Llegó</button>
<button onclick="verDetalle('${r.id}')">Editar</button>

</div>

`;

container.appendChild(row);

});

$("coversTotal").textContent=covers;

}

async function arrive(id){

await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"host_arrive",
id:id,
secret:SHARED_SECRET
})
});

loadReservas();

}

async function verDetalle(id){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"host_get",
id:id,
secret:SHARED_SECRET
})
});

const data=await res.json();

const r=data.reserva;

$("detalle").innerHTML=`

<h3>${r.cliente}</h3>

Teléfono: ${r.telefono}<br>
Personas: ${r.personas}<br><br>

Mesa
<select id="mesa">

<option>Mesa 1</option>
<option>Mesa 2</option>
<option>Mesa 3</option>
<option>Mesa 4</option>

</select>

<br><br>

<h4>COVERS</h4>

${r.covers.map(c=>`
<div class="cover">
${c.nombre} — ${c.plato} — ${c.proteina || "-"}
</div>
`).join("")}

<br>

<button onclick="guardar('${r.id}')">Guardar cambios</button>

`;

}

document.addEventListener("DOMContentLoaded",()=>{

fillSelect($("funcion"),FUNCIONES);

$("funcion").addEventListener("change",loadReservas);

loadReservas();

});

</script>

</body>
</html>
