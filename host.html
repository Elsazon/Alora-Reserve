<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ALORA Service Console</title>

<style>
body{
background:#0b1210;
color:#f4f1ea;
font-family:Inter,system-ui;
margin:0;
padding:40px;
}

.container{
max-width:1400px;
margin:auto;
}

/* HEADER */

.header{
background:#111916;
border:1px solid rgba(255,255,255,.05);
border-radius:16px;
padding:25px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.controls{
display:flex;
gap:20px;
align-items:center;
margin-top:10px;
}

select,input{
background:#0e1511;
border:1px solid rgba(255,255,255,.08);
color:white;
padding:10px;
border-radius:10px;
font-size:14px;
}

/* STATS */

.stats{
margin-top:18px;
display:flex;
gap:35px;
font-size:14px;
opacity:.9;
}

.stats div{
background:#0e1511;
padding:8px 14px;
border-radius:8px;
}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:1fr 420px;
gap:30px;
}

/* RESERVAS PANEL */

.resList{
background:#111916;
border-radius:16px;
border:1px solid rgba(255,255,255,.05);
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* TARJETA RESERVA */

.resCard{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 16px;
border-radius:10px;
margin-bottom:8px;
transition:.2s;
background:rgba(255,255,255,.02);
}

.resCard:hover{
background:#18221c;
transform:translateY(-1px);
}

/* DETALLE */

.detail{
background:#111916;
border-radius:16px;
border:1px solid rgba(255,255,255,.05);
padding:24px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

/* COVERS */

.cover{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,.05);
font-size:14px;
}

.cover:last-child{
border-bottom:none;
}

/* NOTAS */

.note{
margin-top:18px;
background:#0e1511;
padding:14px;
border-radius:10px;
font-size:14px;
line-height:1.4;
}

/* BOTONES */

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
font-weight:600;
font-size:13px;
transition:.2s;
}

/* botón llegó */

button.arrive{
background:#3fa86a;
color:white;
}

button.arrive:hover{
background:#4ec07d;
}

/* botón editar */

button.edit{
background:#2b3531;
color:#f4f1ea;
}

button.edit:hover{
background:#3a4641;
}
  .titleBar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.brand{
font-size:20px;
font-weight:700;
letter-spacing:.5px;
}

.brand span{
opacity:.5;
font-weight:400;
margin-left:8px;
}

.serviceStatus{
background:#1a2420;
padding:6px 12px;
border-radius:6px;
font-size:12px;
}
</style>

</head>

<body>

<div class="container">

<div class="titleBar">

<div class="brand">
ALORA
<span>Service Console</span>
</div>

<div class="serviceStatus">
Servicio activo
</div>

</div>

<div class="header">

<div class="controls">

<label>Función</label>
<select id="funcion"></select>

<label>Buscar</label>
<input id="buscar" placeholder="Cliente">

</div>

<div class="stats">

<div>Covers: <span id="coversTotal">0</span></div>
<div>Llegaron: <span id="coversArrived">0</span></div>
<div>Pendientes: <span id="coversPending">0</span></div>

</div>

</div>

<div class="layout">

<div class="resList" id="reservas"></div>

<div class="detail" id="detalle">

Selecciona una reserva

</div>

</div>

</div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbyb7-4j7fFq_Rr6QveZmJUIbM2fbHXcIQRgA8V4tiwzOqtNO8er9hsck9jv9fm5ve3x/exec";
const SHARED_SECRET="demo123";

const FUNCIONES=[
"Función 1","Función 2","Función 3","Función 4",
"Función 5","Función 6","Función 7","Función 8"
];

const $=id=>document.getElementById(id);

function estadoServicio(horaReserva,llego){

if(llego) return "arrived";

const now = new Date();

const [h,m] = horaReserva.replace(" PM","").replace(" AM","").split(":");

let hour = parseInt(h);
const min = parseInt(m);

if(horaReserva.includes("PM") && hour !== 12) hour += 12;
if(horaReserva.includes("AM") && hour === 12) hour = 0;

const reserva = new Date();
reserva.setHours(hour,min,0,0);

if(now > reserva){
return "late";
}

return "pending";

}
  
let HOST_CACHE = {};
  
function fillSelect(el,list){

el.innerHTML="";

list.forEach(v=>{
const o=document.createElement("option");
o.value=v;
o.textContent=v;
el.appendChild(o);
});

}

async function loadReservas(){

const res=await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"host_list",
funcion:$("funcion").value,
secret:SHARED_SECRET
})
});

const data=await res.json();

renderReservas(data.reservas||[]);

}

function renderReservas(list){

HOST_CACHE = {};

const container = $("reservas");
container.innerHTML = "";

let covers = 0;

list.forEach(r=>{

covers += r.personas;

/* guardar en cache */
HOST_CACHE[r.id] = r;

const estado = estadoServicio(r.hora,r.llego);

let dot = "🟡";

if(estado === "arrived") dot = "🟢";
if(estado === "late") dot = "🔴";

const card = document.createElement("div");
card.className = "resCard";

card.innerHTML = `

<div>
${dot} <strong>${r.hora}</strong> — ${r.cliente}
<span style="opacity:.7">${r.personas} pax</span>
</div>

<div>
Mesa ${r.mesa || "—"}

<button class="arrive" onclick="arrive('${r.id}')">Llegó</button>
<button class="edit" onclick="verDetalle('${r.id}')">Editar</button>
</div>

`;

container.appendChild(card);

});

$("coversTotal").textContent = covers;

}

async function arrive(id){

await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"host_arrive",
id:id,
secret:SHARED_SECRET
})
});

loadReservas();

}

async function verDetalle(id){

let r = HOST_CACHE[id];

/* si no tiene covers aún → traerlos del backend */

if(!r || !r.covers){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"host_get",
id:id,
secret:SHARED_SECRET
})
});

const data = await res.json();

r = data.reserva;

/* guardarlo en cache */

HOST_CACHE[id] = r;

}

/* render detalle */

$("detalle").innerHTML=`

<h3>${r.cliente}</h3>

Teléfono: ${r.telefono}<br>
Personas: ${r.personas}

<h4>COVERS</h4>

${r.covers.map(c=>`
<div class="cover">
<strong>${c.nombre}</strong><br>
Aperitivo: ${c.aperitivo || "-"}<br>
Principal: ${c.principal || "-"}<br>
Postre: ${c.postre || "-"}<br>
Proteína: ${c.proteina || "-"}
</div>
`).join("")}

${r.notas ? `
<h4>Notas</h4>
<div class="note">${r.notas}</div>
` : ""}

`;

}

document.addEventListener("DOMContentLoaded",()=>{

fillSelect($("funcion"),FUNCIONES);

$("funcion").addEventListener("change",loadReservas);

loadReservas();

});

</script>

</body>
</html>
