<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>ALORA Expo Line</title>
<script src="./config.js"></script>
<style>

body{
font-family:Inter,Arial;
background:#fff;
padding:20px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.block{
margin-bottom:30px;
page-break-inside:avoid;
}

.block h2{
border-bottom:2px solid black;
padding-bottom:5px;
margin-bottom:10px;
}

.row{
display:grid;
grid-template-columns:60px 140px 140px 1fr 1fr 120px 1fr;
gap:8px;
padding:6px 0;
border-bottom:1px dashed #ccc;
font-size:13px;
align-items:center;
}

.header{
font-weight:bold;
border-bottom:2px solid black;
}

.mesa{
height:28px;
border-bottom:2px solid black;
}

.print{
position:fixed;
top:10px;
right:10px;
padding:10px;
background:black;
color:white;
cursor:pointer;
}
  .row{
border-bottom:1px dashed #ccc;
}

.block{
border:2px solid #000;
padding:10px;
}

</style>

</head>

<body>

<button class="print" onclick="window.print()">🖨 Print</button>

<h1>ALORA · EXPO LINE</h1>

<div id="content"></div>

<script>

//const BACKEND_URL="https://script.google.com/macros/s/AKfycbw3Fva80PuWWX6w0lPZ4KMF6j7ytDfeW2s4qMw4T3y7Oj310uJLaGH1rfor_kR4S22d/exec";
const FUNCION="Función 2";

async function load(){

const res = await fetch(CONFIG.BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain"},
body:JSON.stringify({
action:"kitchen_list",
funcion:FUNCION,
secret:"demo123"
})
});

const data = await res.json();

render(data.rows);

}

function groupByHora(rows){

const map = {};

rows.forEach(r=>{
if(!map[r.hora]) map[r.hora]=[];
map[r.hora].push(r);
});

return map;

}

function render(rows){

const groupedByHora = {};

rows.forEach(r=>{
if(!groupedByHora[r.hora]) groupedByHora[r.hora]=[];
groupedByHora[r.hora].push(r);
});

const html = Object.keys(groupedByHora).map(hora=>{

const rowsHora = groupedByHora[hora];

/* 🔥 agrupar por reservación */
const groupedByReserva = {};

rowsHora.forEach(r=>{
if(!groupedByReserva[r.reserva]) groupedByReserva[r.reserva]=[];
groupedByReserva[r.reserva].push(r);
});

return `
<div class="block">

<h2>${hora}</h2>

<div class="row header">
<div>Mesa</div>
<div>Reservación</div>
<div>Persona</div>
<div>Aperitivo</div>
<div>Principal</div>
<div>Proteína</div>
<div>Postre / Notas</div>
</div>

${Object.keys(groupedByReserva).map(reserva=>{

const grupo = groupedByReserva[reserva];

return grupo.map((r,i)=>`
<div class="row">

<div>${i===0 ? '<div class="mesa"></div>' : ''}</div>

<div>${i===0 ? reserva : ''}</div>

<div>${r.persona}</div>
<div>${r.aperitivo}</div>
<div>${r.principal}</div>
<div>${r.proteina}</div>
<div>${r.postre || ""} ${r.notas ? "• "+r.notas : ""}</div>

</div>
`).join("");

}).join("")}

</div>
`;

}).join("");

document.getElementById("content").innerHTML = html;

}

load();

</script>

</body>
</html>
