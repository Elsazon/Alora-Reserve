<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reserva ALORA</title>

<style>

body{
margin:0;
background:#0e1511;
font-family:Arial;
color:#f4f1ea;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{

background:#121a16;
padding:40px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
text-align:center;

box-shadow:0 40px 100px rgba(0,0,0,.7);

max-width:400px;
width:90%;

}

.logo{
height:90px;
margin-bottom:20px;
}

.code{

font-size:28px;
letter-spacing:4px;
border:2px solid #c26a4a;
padding:10px 20px;
display:inline-block;
border-radius:10px;
margin-bottom:20px;

}

.qr{
background:white;
padding:12px;
border-radius:12px;
display:inline-block;
}

.small{
margin-top:20px;
font-size:12px;
color:rgba(244,241,234,.6);
}

</style>

</head>

<body>

<div class="card">

<img class="logo"
src="https://raw.githubusercontent.com/Elsazon/Alora-Reserve/main/7E279685-0A21-4575-9890-80E64F81A59E.png">

<div id="code" class="code"></div>

<div class="qr">
<img id="qr">
</div>

<div class="small">
Presenta este código al llegar
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")

document.getElementById("code").innerText = id

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+id

</script>

</body>
</html>
