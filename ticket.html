<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Ticket</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg0:#0e1511;
--bg1:#121a16;

--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);

--terracotta:#c26a4a;
--gold:#bfa15a;

--line:rgba(255,255,255,.08);

}

body{

margin:0;
font-family:Inter;

color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

.ticket{

width:520px;
max-width:92%;

background:rgba(255,255,255,.05);

border:1px solid var(--line);

border-radius:28px;

padding:50px;

box-shadow:
0 40px 120px rgba(0,0,0,.7);

text-align:center;

backdrop-filter:blur(8px);

}

.logo img{

height:130px;

filter:
drop-shadow(0 30px 70px rgba(0,0,0,.6))
drop-shadow(0 0 18px rgba(191,161,90,.15));

margin-bottom:24px;

}

.title{

font-family:"Playfair Display",serif;
font-size:30px;

margin-bottom:8px;

}

.meta{

font-size:12px;
letter-spacing:2px;

color:var(--muted);

text-transform:uppercase;

margin-bottom:26px;

}

.codeLabel{

font-size:12px;
letter-spacing:2px;

color:var(--muted);

text-transform:uppercase;

}

.code{

font-size:28px;
font-weight:600;

letter-spacing:3px;

margin:10px 0 24px;

}

.row{

display:flex;
justify-content:space-between;

padding:10px 0;

border-bottom:1px solid var(--line);

font-size:14px;

}

.row span{

color:var(--muted);

}

.menu{

margin-top:28px;
text-align:left;

}

.menu h3{

font-family:"Playfair Display",serif;

margin-bottom:14px;

}

.menuPerson{

margin-bottom:16px;

padding-bottom:10px;

border-bottom:1px solid rgba(255,255,255,.08);

font-size:14px;

}

.menuPerson strong{
display:block;
margin-bottom:4px;
}

.notes{

margin-top:22px;

padding:14px;

border-radius:12px;

border:1px solid var(--line);

background:rgba(255,255,255,.03);

font-size:13px;

line-height:1.6;

color:var(--muted);

}

.qr{

margin-top:36px;

}

.qr img{

width:170px;

background:white;

padding:12px;

border-radius:12px;

}

.note{

margin-top:12px;

font-size:12px;

color:var(--muted);

}

</style>

</head>

<body>

<div class="ticket">

<div class="logo">

<img src="7E279685-0A21-4575-9890-80E64F81A59E.png">

</div>

<div class="title">Reserva confirmada</div>

<div class="meta">Experiencia gastronómica</div>

<div class="codeLabel">Código de reserva</div>

<div class="code" id="ticketCode">
Cargando...
</div>

<div class="row">
<span>Cliente</span>
<div id="cliente"></div>
</div>

<div class="row">
<span>Función</span>
<div id="funcion"></div>
</div>

<div class="row">
<span>Hora</span>
<div id="hora"></div>
</div>

<div class="row">
<span>Invitados</span>
<div id="guests"></div>
</div>

<div class="menu">

<h3>Selección del menú</h3>

<div id="menu"></div>

</div>

<div id="notesBlock" class="notes" style="display:none">

<strong>Notas del cliente</strong>

<div id="notesText"></div>

</div>

<div class="qr">

<img id="qr">

<div class="note">
Presenta este ticket al llegar al restaurante
</div>

</div>

</div>

<script>

/* ======================
CONFIG
====================== */

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbxcsWaqnLp_4mOaxj7K1yH6_xafdCwN5f_xk__K-ZgPRn-X_xAuf7lZiHju--uww-zR/exec";

const SHARED_SECRET = "demo123";


/* ======================
LEER ID
====================== */

const params = new URLSearchParams(window.location.search);

const ticketId = params.get("id");

document.getElementById("ticketCode").textContent = ticketId;


/* ======================
GENERAR QR
====================== */

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
encodeURIComponent(ticketId);


/* ======================
CARGAR RESERVA
====================== */

async function cargarReserva(){

if(!ticketId){

alert("Ticket inválido");

return;

}

try{

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"get_ticket",
secret:SHARED_SECRET,
ticketId:ticketId
})
});

const data = await res.json();

if(!data.ok){

alert("Reserva no encontrada");

return;

}

renderReserva(data.reserva);

}catch(e){

console.error(e);

alert("Error cargando ticket");

}

}


/* ======================
RENDER RESERVA
====================== */

function renderReserva(data){

document.getElementById("cliente").textContent = data.cliente;

document.getElementById("funcion").textContent = data.funcion;

document.getElementById("hora").textContent = data.hora;

document.getElementById("guests").textContent = data.guests.length;


/* MENU */

const menu = document.getElementById("menu");

menu.innerHTML = "";

data.guests.forEach((g,i)=>{

const div = document.createElement("div");

div.className = "menuPerson";

div.innerHTML = `
<strong>${g.name || "Invitado "+(i+1)}</strong><br>
${g.aperitivo ? "Aperitivo: "+g.aperitivo+"<br>" : ""}
Principal: ${g.principal || "-"}<br>
${g.proteina ? "Proteína: "+g.proteina+"<br>" : ""}
${g.postre ? "Postre: "+g.postre : ""}
`;

menu.appendChild(div);

});


/* NOTAS */

if(data.notas){

document.getElementById("notesBlock").style.display = "block";

document.getElementById("notesText").textContent = data.notas;

}

}


/* ======================
INIT
====================== */

cargarReserva();

</script>

</body>
</html>
