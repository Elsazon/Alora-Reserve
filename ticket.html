<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Ticket</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg0:#0e1511;
--bg1:#121a16;

--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);

--terracotta:#c26a4a;
--gold:#bfa15a;

--line:rgba(255,255,255,.08);

}

body{

margin:0;
font-family:Inter;

color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

.ticket{

width:520px;
max-width:92%;

background:rgba(255,255,255,.05);

border:1px solid var(--line);

border-radius:28px;

padding:50px;

box-shadow:
0 40px 120px rgba(0,0,0,.7);

text-align:center;

backdrop-filter:blur(8px);

}

.logo img{

height:130px;

filter:
drop-shadow(0 30px 70px rgba(0,0,0,.6))
drop-shadow(0 0 18px rgba(191,161,90,.15));

margin-bottom:24px;

}

.title{

font-family:"Playfair Display",serif;
font-size:30px;

margin-bottom:8px;

}

.meta{

font-size:12px;
letter-spacing:2px;

color:var(--muted);

text-transform:uppercase;

margin-bottom:26px;

}

.codeLabel{

font-size:12px;
letter-spacing:2px;

color:var(--muted);

text-transform:uppercase;

}

.code{

font-size:30px;

font-weight:600;

letter-spacing:4px;

margin:12px 0 26px;

padding:12px 24px;

display:inline-block;

border:2px solid var(--terracotta);

border-radius:14px;

background:rgba(255,255,255,.03);

}

.row{

display:flex;
justify-content:space-between;

padding:10px 0;

border-bottom:1px solid var(--line);

font-size:14px;

}

.row span{

color:var(--muted);

}

.menu{

margin-top:28px;
text-align:left;

}

.menu h3{

font-family:"Playfair Display",serif;

margin-bottom:14px;

}

.menuPerson{

margin-bottom:22px;

padding-bottom:16px;

border-bottom:1px solid rgba(255,255,255,.08);

}

.menuPerson strong{

font-size:15px;

font-weight:600;

letter-spacing:.4px;

margin-bottom:8px;

display:block;

}

.menuCourse{

font-size:11px;

letter-spacing:2px;

text-transform:uppercase;

color:rgba(244,241,234,.45);

margin-top:8px;

}

.menuDish{

font-size:14px;

margin-top:2px;

}

.notes{

margin-top:22px;

padding:14px;

border-radius:12px;

border:1px solid var(--line);

background:rgba(255,255,255,.03);

font-size:13px;

line-height:1.6;

color:var(--muted);

}

.qr{

margin-top:36px;

}

.qr img{

width:170px;

background:white;

padding:12px;

border-radius:12px;

}

.note{

margin-top:12px;

font-size:12px;

color:var(--muted);

}
.editBtn{

display:inline-block;

margin-top:10px;

padding:12px 22px;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.12);

font-size:13px;

font-weight:500;

cursor:pointer;

transition:.25s;

text-decoration:none; /* 👈 evita azul */

color:var(--ink); /* 👈 mantiene color del ticket */

}

.editBtn:hover{

background:#c26a4a;

color:#111;

}

.editNote{

font-size:12px;

margin-top:10px;

color:rgba(255,255,255,.6);

}
.editBtn{

display:inline-block;

margin-top:10px;

padding:12px 22px;

border-radius:14px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.12);

font-size:13px;

font-weight:500;

cursor:pointer;

transition:.25s;

color:var(--ink);

}
  #costSection{
margin-top:30px;
box-shadow:
0 25px 70px rgba(0,0,0,.45),
0 0 0 1px rgba(255,255,255,.03);
}
</style>

</head>

<body>

<div class="ticket">

<div class="logo">

<img src="7E279685-0A21-4575-9890-80E64F81A59E.png">

</div>

<div class="title">Reserva confirmada</div>

<div class="meta">Experiencia gastronómica</div>
<div style="
width:80px;
height:1px;
background:var(--gold);
margin:18px auto 22px;
opacity:.6;
"></div>
<div class="codeLabel">Código de reserva</div>

<div class="code" id="ticketCode">
Cargando...
</div>

<div class="row">
<span>Cliente</span>
<div id="cliente"></div>
</div>

<div class="row">
<span>Función</span>
<div id="funcion"></div>
</div>

<div class="row">
<span>Hora</span>
<div id="hora"></div>
</div>

<div class="row">
<span>Invitados</span>
<div id="guests"></div>
</div>

<div class="menu">

<h3>Selección Gastronómica</h3>

<div id="menu"></div>

</div>

<div id="notesBlock" class="notes" style="display:none">

<strong>Notas del cliente</strong>

<div id="notesText"></div>

</div>

  <div id="costSection" style="
margin-top:26px;
padding:18px;
border-radius:14px;
border:1px solid var(--line);
background:rgba(255,255,255,.03);
display:none;
text-align:left;
">

<div style="
font-family:'Playfair Display',serif;
font-size:18px;
margin-bottom:12px;
">
Resumen de la experiencia
</div>

<div id="costBreakdown"></div>
  </div>

<div class="note">
Presenta este ticket al llegar al restaurante
</div>
  
<div class="qr">

<img id="qr">

<div style="margin-top:28px">

<button id="editBtn" class="editBtn">
Cambiar reserva
</button>

<button id="cancelBtn" class="editBtn" style="margin-left:10px;">
Cancelar reserva
</button>
  
<div class="editNote">
Cambios disponibles hasta el lunes previo a la función a las 11:59 PM
</div>

</div>
  
</div>

</div>

<script>

/* ======================
CONFIG
====================== */

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbxAuv0er3IjmuD2zzpBiiLw_77BI4NJXi-1JNe_nO93hMrwxh-SbAfngYlpQRJOYiYA/exec";

const SHARED_SECRET = "demo123";


/* ======================
LEER ID
====================== */

const params = new URLSearchParams(window.location.search);

const ticketId = params.get("id");

if(!ticketId){
alert("Ticket inválido");
throw new Error("ticketId missing");
}
  
const shortCode =
"ALR-" + ticketId.replace(/-/g,"").slice(-6).toUpperCase();

document.getElementById("ticketCode").textContent = shortCode;


/* ======================
GENERAR QR
====================== */

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
encodeURIComponent(ticketId);


/* ======================
CARGAR RESERVA
====================== */

async function cargarReserva(){

if(!ticketId){

alert("Ticket inválido");
return;

}

try{

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"get_ticket",
secret:SHARED_SECRET,
ticketId:ticketId
})
});

const data = await res.json();

if(!data.ok){

alert("Reserva no encontrada");
return;

}

renderReserva(data.reserva);

}catch(e){

console.error(e);

}

}

/* ======================
RENDER RESERVA
====================== */

function renderReserva(reserva){

document.getElementById("cliente").textContent = reserva.cliente;
document.getElementById("funcion").textContent = reserva.funcion;
document.getElementById("hora").textContent = reserva.hora;
document.getElementById("guests").textContent = reserva.guests.length;

const menuDiv = document.getElementById("menu");

menuDiv.innerHTML = "";

reserva.guests.forEach((g,i)=>{

const item = document.createElement("div");

item.className = "menuPerson";

item.innerHTML = `

<strong>${g.name || "Invitado "+(i+1)}</strong>

<div class="menuCourse">Aperitivo</div>
<div class="menuDish">${g.aperitivo || "-"}</div>

<div class="menuCourse">Principal</div>
<div class="menuDish">
${g.principal || "-"}
${g.proteina ? "<br>+ "+g.proteina : ""}
</div>

<div class="menuCourse">Postre</div>
<div class="menuDish">${g.postre || "-"}</div>

`;

menuDiv.appendChild(item);

});
if(reserva.notas){

document.getElementById("notesBlock").style.display = "block";
document.getElementById("notesText").textContent = reserva.notas;

}
/* ======================
CALCULAR COSTOS
====================== */

let adultos = 0;
let ninos = 0;

reserva.guests.forEach(g=>{

if(g.aperitivo || g.postre){
adultos++;
}else{
ninos++;
}

});

let total = adultos * 35 + ninos * 12.50;

if(reserva.descorche){
total += 12;
}

const costSection = document.getElementById("costSection");
const costBreakdown = document.getElementById("costBreakdown");

costSection.style.display = "block";

costBreakdown.innerHTML = `

<div class="row">
<span>Adultos (${adultos})</span>
<div>$${(adultos*35).toFixed(2)}</div>
</div>

<div class="row">
<span>Niños (${ninos})</span>
<div>$${(ninos*12.50).toFixed(2)}</div>
</div>

${reserva.descorche ? `
<div class="row">
<span>🍷 Descorche</span>
<div>$12.00</div>
</div>
` : ``}

<div class="row" style="
border-top:1px solid var(--line);
margin-top:10px;
padding-top:12px;
font-weight:600;
">

<span>Total estimado</span>
<div>$${total.toFixed(2)}</div>

</div>

<div style="
font-size:12px;
margin-top:8px;
color:var(--muted);
">

El pago se realiza en el restaurante antes de comenzar el servicio.

</div>

`;
  

    /* ======================
Activacio o Bloqueo de Boton
====================== */
const editBtn = document.getElementById("editBtn");

if(editingAllowed(reserva.funcion)){

editBtn.onclick = () => {

window.location.href =
"index.html?edit=" + ticketId;

};

}else{

editBtn.textContent = "Edición cerrada";

editBtn.style.opacity = ".4";

editBtn.disabled = true;

}


/* ======================
Cancelacion
====================== */

const cancelBtn = document.getElementById("cancelBtn");

if(editingAllowed(reserva.funcion)){

cancelBtn.onclick = async () => {

const confirmCancel = confirm(
"¿Seguro que deseas cancelar tu reserva?\n\nEsta acción no se puede deshacer."
);

if(!confirmCancel) return;

try{

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"cancel",
secret:SHARED_SECRET,
ticketId:ticketId
})
});

const data = await res.json();

if(data.ok){

document.querySelector(".title").textContent = "Reserva cancelada";

cancelBtn.style.display = "none";
editBtn.style.display = "none";

alert("Tu reserva fue cancelada correctamente.");

}else{

alert("No se pudo cancelar la reserva.");

}

}catch(e){

console.error(e);
alert("Error de conexión.");

}

};

}else{

cancelBtn.textContent = "Cancelación cerrada";
cancelBtn.style.opacity = ".4";
cancelBtn.disabled = true;

}
  }
/* ======================
Cambio de Reservacion
====================== */
const FUNCION_FECHAS = {

"Función 1":"2026-03-19",
"Función 2":"2026-03-26",
"Función 3":"2026-04-09",
"Función 4":"2026-04-16",
"Función 5":"2026-04-23",
"Función 6":"2026-04-30",
"Función 7":"2026-05-07",
"Función 8":"2026-05-14"

};
function editingAllowed(funcion){

const fechaFuncion = new Date(FUNCION_FECHAS[funcion]);

const monday = new Date(fechaFuncion);

const day = monday.getDay();

const diff = monday.getDate() - day + (day === 0 ? -6 : 1);

monday.setDate(diff);

monday.setHours(23,59,0,0);

const now = new Date();

return now <= monday;

}

/* ======================
INIT
====================== */

cargarReserva();

</script>

</body>
</html>
