<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ALORA Feedback</title>

<style>

/* BASE */

body{
background:#0b1210;
color:#f4f1ea;
font-family:Inter,system-ui;
margin:0;
padding:20px;
}

/* CONTAINER */

.container{
max-width:620px;
margin:auto;
}

/* CARD */

.card{
background:#111916;
border-radius:22px;
padding:32px;
box-shadow:0 40px 100px rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.05);
animation:fadeIn .5s ease;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:28px;
}

.logo{
width:130px;
margin-bottom:12px;
opacity:.95;
}

.title{
font-size:22px;
font-weight:600;
letter-spacing:.5px;
}

.subtitle{
font-size:13px;
opacity:.6;
margin-top:4px;
}

/* SECTION */

.section{
margin-bottom:24px;
}

.label{
margin-bottom:10px;
font-size:14px;
opacity:.75;
}

/* STARS */

.stars{
display:flex;
gap:10px;
}

.star{
font-size:30px;
cursor:pointer;
opacity:.25;
transition:.25s;
}

.star:hover{
transform:scale(1.2);
}

.star.active{
opacity:1;
color:#c26a4a;
text-shadow:0 0 12px rgba(194,106,74,.5);
}

/* TEXTAREA */

textarea{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#0e1511;
color:white;
resize:none;
height:110px;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#c26a4a;
color:#111;
font-weight:600;
cursor:pointer;
margin-top:15px;
font-size:15px;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 12px 25px rgba(194,106,74,.35);
}

/* SUCCESS */

.successCard{
text-align:center;
padding:60px 30px;
}

.successLogo{
width:150px;
margin-bottom:18px;
}

.successTitle{
font-size:24px;
margin-bottom:10px;
}

.successDivider{
width:60px;
height:2px;
background:#c26a4a;
margin:18px auto;
opacity:.6;
}

.successText{
font-size:14px;
opacity:.7;
line-height:1.6;
}

/* ANIMATION */

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>

</head>

<body>

<div class="container">

<!-- FORM -->

<div class="card" id="form">

<div class="header">

<img class="logo"
src="https://raw.githubusercontent.com/Elsazon/Alora-Reserve/main/7E279685-0A21-4575-9890-80E64F81A59E.png">

<div class="title">Tu experiencia en ALORA</div>
<div class="subtitle">Tu opinión perfecciona cada detalle</div>

</div>

<div class="section" id="q1"></div>
<div class="section" id="q2"></div>
<div class="section" id="q3"></div>
<div class="section" id="q4"></div>
<div class="section" id="q5"></div>

<div class="section">
<div class="label">Comentarios adicionales</div>
<textarea id="comentario" placeholder="Comparte tu experiencia..."></textarea>
</div>

<button onclick="submitFeedback()">Enviar experiencia</button>

</div>

<!-- SUCCESS -->

<div id="done" style="display:none" class="card successCard">

<img class="successLogo"
src="https://raw.githubusercontent.com/Elsazon/Alora-Reserve/main/7E279685-0A21-4575-9890-80E64F81A59E.png">

<div class="successTitle">Gracias por tu visita</div>

<div class="successDivider"></div>

<div class="successText">
En <strong>ALORA</strong> cada experiencia es única.<br>
Tu feedback nos ayuda a seguir elevando nuestro servicio.
<br><br>
Esperamos recibirte nuevamente.
</div>

</div>

</div>

<script>

const BACKEND_URL="https://script.google.com/macros/s/AKfycbwTmUo33jhlWoppb0Sww5eXF2ecmwpRyMT7tx6z7soJYf5nfvB4b2_M_rNArHSHxa8n/exec";
const SHARED_SECRET="demo123";

const preguntas = [
"Comida",
"Servicio",
"Tiempo",
"Ambiente",
"General"
];

const ratings = {};

function render(){

preguntas.forEach((p,i)=>{

const id = "q"+(i+1);

const div = document.getElementById(id);

div.innerHTML = `
<div class="label">${p}</div>
<div class="stars">
${[1,2,3,4,5].map(n=>`
<span class="star" onclick="rate('${p}',${n})">★</span>
`).join("")}
</div>
`;

});

}

function rate(cat,val){

ratings[cat] = val;

const stars = document.querySelectorAll(`#q${preguntas.indexOf(cat)+1} .star`);

stars.forEach((s,i)=>{
s.classList.toggle("active", i < val);
});

}

async function submitFeedback(){

try{

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{"Content-Type":"text/plain;charset=utf-8"},
body:JSON.stringify({
action:"feedback_create",
comida:ratings["Comida"],
servicio:ratings["Servicio"],
tiempo:ratings["Tiempo"],
ambiente:ratings["Ambiente"],
general:ratings["General"],
comentario:document.getElementById("comentario").value,
secret:SHARED_SECRET
})
});

const data = await res.json();

if(!data.ok){
alert("Error: " + data.error);
return;
}

document.getElementById("form").style.display="none";
document.getElementById("done").style.display="block";

}catch(err){

alert("Network error");

}

}

render();

</script>

</body>
</html>
