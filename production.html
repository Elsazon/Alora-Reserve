<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Producción</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg0:#0e1511;
--bg1:#121a16;

--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);

--terracotta:#c26a4a;
--gold:#bfa15a;

--line:rgba(255,255,255,.08);

}

body{

margin:0;
font-family:Inter;
color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
justify-content:center;

min-height:100vh;

}

.container{

width:1000px;
max-width:92%;

padding:60px 0;

}

.title{

font-family:"Playfair Display",serif;
font-size:34px;

margin-bottom:8px;

}

.subtitle{

color:var(--muted);
font-size:13px;

letter-spacing:2px;
text-transform:uppercase;

margin-bottom:40px;

}

.covers{

font-size:42px;
font-weight:600;

margin-bottom:50px;

}

.section{

margin-bottom:40px;

}

.section h2{

font-family:"Playfair Display",serif;
font-size:22px;

margin-bottom:16px;

}

.item{

display:flex;
justify-content:space-between;

padding:10px 0;

border-bottom:1px solid var(--line);

font-size:16px;

}

.item span{

color:var(--muted);

}

</style>

</head>

<body>

<div class="container">

<div class="title">ALORA · Producción</div>

<div class="subtitle" id="funcionLabel">
Cargando función...
</div>

<div class="covers" id="coversTotal">
0 invitados
</div>

<div class="section">

<h2>Aperitivos</h2>

<div id="aperitivos"></div>

</div>

<div class="section">

<h2>Principales</h2>

<div id="principales"></div>

</div>

<div class="section">

<h2>Postres</h2>

<div id="postres"></div>

</div>

</div>

<script>

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbzTcoYle5RGIp94ek5xsnErF9GhSpA7RuaDt8BLdIAGSjPjo0_dPUCNjHMBgWYBAykV/exec";

const SHARED_SECRET = "demo123";

/* función actual */

const params = new URLSearchParams(window.location.search);

const funcion = params.get("funcion") || "Función 1";

document.getElementById("funcionLabel").textContent = funcion;

/* cargar producción */

async function loadProduction(){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"production",
secret:SHARED_SECRET,
funcion:funcion
})
});

const data = await res.json();

renderProduction(data);

}

function renderProduction(data){

let covers = 0;

renderList("aperitivos",data.aperitivos);
renderList("principales",data.principales);
renderList("postres",data.postres);

Object.values(data.aperitivos).forEach(v=>covers+=v);
Object.values(data.principales).forEach(v=>covers+=v);

document.getElementById("coversTotal").textContent =
covers+" invitados";

}

function renderList(container,data){

const el = document.getElementById(container);

el.innerHTML="";

for(const plato in data){

const row = document.createElement("div");

row.className="item";

row.innerHTML =
`<div>${plato}</div>
<div>${data[plato]}</div>`;

el.appendChild(row);

}

}

loadProduction();

</script>

</body>
</html>
