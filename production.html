<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Producción</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg0:#0e1511;
--bg1:#121a16;

--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);

--terracotta:#c26a4a;
--gold:#bfa15a;

--line:rgba(255,255,255,.08);

}

body{

margin:0;
font-family:Inter;

color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

min-height:100vh;

display:flex;
justify-content:center;

}

.container{

width:1200px;
max-width:95%;

padding:60px 0;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:40px;

}

.title{

font-family:"Playfair Display",serif;
font-size:34px;

}

.funcionSelect{

background:rgba(255,255,255,.05);
border:1px solid var(--line);
border-radius:12px;

padding:10px 16px;

color:var(--ink);

}

.stats{

display:grid;
grid-template-columns:1fr 1fr;

gap:30px;

margin-bottom:40px;

}

.statCard{

background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:16px;

padding:24px;

}

.statTitle{

font-size:12px;
letter-spacing:2px;
color:var(--muted);

text-transform:uppercase;

margin-bottom:8px;

}

.statValue{

font-size:36px;
font-weight:600;

}

.board{

display:grid;
grid-template-columns:1fr 1fr 1fr;

gap:30px;

}

.column{

background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:16px;

padding:24px;

}

.column h2{

font-family:"Playfair Display",serif;
margin-bottom:16px;

}

.item{

display:flex;
justify-content:space-between;

padding:8px 0;

border-bottom:1px solid var(--line);

}

.item:last-child{
border:none;
}

.topPlates{

margin-top:40px;

background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:16px;

padding:24px;

}

.topPlates h2{

font-family:"Playfair Display",serif;

margin-bottom:18px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
ALORA · Producción
</div>

<select id="funcionSelect" class="funcionSelect"></select>

</div>

<div class="stats">

<div class="statCard">

<div class="statTitle">
Covers
</div>

<div id="coversTotal" class="statValue">
0
</div>

</div>

<div class="statCard">

<div class="statTitle">
Proteínas totales
</div>

<div id="proteinasTotal" class="statValue">
0
</div>

</div>

</div>

<div class="board">

<div class="column">

<h2>Proteínas</h2>

<div id="proteinas"></div>

</div>

<div class="column">

<h2>Aperitivos</h2>

<div id="aperitivos"></div>

</div>

<div class="column">

<h2>Postres</h2>

<div id="postres"></div>

</div>

</div>

<div class="column" style="margin-top:30px">

<h2>Principales</h2>

<div id="principales"></div>

</div>

<div class="topPlates">

<h2>Top Platos</h2>

<div id="topPlates"></div>

</div>

</div>

<script>

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbz6YGZOzCxTZZcrxs74Dk3TxG3OJ4UteWl_-fsaDeJk1N-K0kmYr7NL96_9XfHx0Eux/exec";

const SHARED_SECRET = "demo123";

/* cargar funciones */

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"funciones",
secret:SHARED_SECRET
})
});

const data = await res.json();

const select = document.getElementById("funcionSelect");

data.funciones.forEach(f=>{

const opt = document.createElement("option");

opt.value = f;
opt.textContent = f;

select.appendChild(opt);

});

select.onchange = loadProduction;

loadProduction();

}

/* cargar producción */

async function loadProduction(){

const funcion =
document.getElementById("funcionSelect").value;

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"production",
secret:SHARED_SECRET,
funcion:funcion
})
});

const data = await res.json();

renderProduction(data);

}

/* render */

function renderProduction(data){

document.getElementById("coversTotal").textContent =
data.covers;

renderColumn("proteinas",data.board.proteinas);
renderColumn("aperitivos",data.board.aperitivos);
renderColumn("principales",data.board.principales);
renderColumn("postres",data.board.postres);

renderTopPlates(data.board.principales);

}

/* render columnas */

function renderColumn(container,data){

const el = document.getElementById(container);

el.innerHTML="";

for(const name in data){

const row = document.createElement("div");

row.className="item";

row.innerHTML = `
<div>${name}</div>
<div>${data[name]}</div>
`;

el.appendChild(row);

}

}

/* top platos */

function renderTopPlates(principales){

const sorted = Object.entries(principales)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

const el = document.getElementById("topPlates");

el.innerHTML="";

sorted.forEach(p=>{

const row = document.createElement("div");

row.className="item";

row.innerHTML = `
<div>${p[0]}</div>
<div>${p[1]}</div>
`;

el.appendChild(row);

});

}

/* init */

loadFunciones();

</script>

</body>
</html>
