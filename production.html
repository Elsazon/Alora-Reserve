<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Producción</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg0:#0e1511;
--bg1:#121a16;

--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);

--terracotta:#c26a4a;
--gold:#bfa15a;

--line:rgba(255,255,255,.08);

}

body{

margin:0;
font-family:Inter;

color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

min-height:100vh;

display:flex;
justify-content:center;

}

.container{

width:1100px;
max-width:94%;

padding:60px 0;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:50px;

}

.title{

font-family:"Playfair Display",serif;
font-size:32px;

}

.funcionSelect{

background:rgba(255,255,255,.05);
border:1px solid var(--line);
border-radius:10px;

padding:10px 16px;

color:var(--ink);

font-size:14px;

}

.covers{

font-size:36px;
font-weight:600;

margin-bottom:40px;

}

.board{

display:grid;
grid-template-columns:1fr 1fr 1fr;

gap:30px;

}

.column{

background:rgba(255,255,255,.04);

border:1px solid var(--line);

border-radius:16px;

padding:24px;

}

.column h2{

font-family:"Playfair Display",serif;

margin-bottom:18px;

}

.item{

display:flex;
justify-content:space-between;

padding:10px 0;

border-bottom:1px solid var(--line);

font-size:16px;

}

.item:last-child{
border:none;
}

.item span{
color:var(--muted);
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title">
ALORA · Producción
</div>

<select id="funcionSelect" class="funcionSelect"></select>

</div>

<div id="coversTotal" class="covers">
0 covers
</div>

<div class="board">

<div class="column">

<h2>Aperitivos</h2>

<div id="aperitivos"></div>

</div>

<div class="column">

<h2>Principales</h2>

<div id="principales"></div>

</div>

<div class="column">

<h2>Postres</h2>

<div id="postres"></div>

</div>

</div>

</div>

<script>

/* CONFIG */

const BACKEND_URL =
"https://script.google.com/macros/s/AKfycbwg8do0xlbQ1gJ2Ki6drsfAjxSKAWsP6XyDp4vRt0Uir3mBqy2koYaI7hpNgcMy2QAN/exec";

const SHARED_SECRET = "demo123";

/* cargar funciones */

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"funciones",
secret:SHARED_SECRET
})
});

const data = await res.json();

const select = document.getElementById("funcionSelect");

select.innerHTML="";

data.funciones.forEach(f=>{

const opt=document.createElement("option");

opt.value=f;
opt.textContent=f;

select.appendChild(opt);

});

select.onchange = loadProduction;

loadProduction();

}

/* cargar producción */

async function loadProduction(){

const funcion =
document.getElementById("funcionSelect").value;

const res = await fetch(BACKEND_URL,{
method:"POST",
headers:{ "Content-Type":"text/plain;charset=utf-8" },
body:JSON.stringify({
action:"production_board",
secret:SHARED_SECRET,
funcion:funcion
})
});

const data = await res.json();

renderProduction(data.board);

}

/* render */

function renderProduction(board){

renderColumn("aperitivos",board.aperitivos);
renderColumn("principales",board.principales);
renderColumn("postres",board.postres);

let covers=0;

Object.values(board.principales).forEach(v=>{
covers+=v;
});

document.getElementById("coversTotal").textContent =
covers+" covers";

}

function renderColumn(container,data){

const el = document.getElementById(container);

el.innerHTML="";

for(const plato in data){

const row=document.createElement("div");

row.className="item";

row.innerHTML=`
<div>${plato}</div>
<div>${data[plato]}</div>
`;

el.appendChild(row);

}

}

/* init */

loadFunciones();

</script>

</body>
</html>
