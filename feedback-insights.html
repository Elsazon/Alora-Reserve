<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALORA · Feedback Insights</title>

<style>

body{
background:radial-gradient(circle at top,#0f1814,#0b1210);
color:#f4f1ea;
font-family:Inter;
margin:0;
padding:24px;
}

.container{
max-width:950px;
margin:auto;
}

h1{
font-weight:500;
letter-spacing:.5px;
margin-bottom:20px;
}

/* CARDS */

.card{
background:linear-gradient(145deg,#121a16,#0e1511);
border-radius:20px;
padding:24px;
border:1px solid rgba(255,255,255,.06);
margin-bottom:18px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* METRICS */

.row{
display:flex;
gap:16px;
flex-wrap:wrap;
}

.metric{
flex:1;
min-width:140px;
background:rgba(255,255,255,.03);
padding:16px;
border-radius:14px;
text-align:center;
border:1px solid rgba(255,255,255,.05);
}

.metric h2{
margin:0;
font-size:28px;
color:#d4b06a;
font-weight:600;
}

.metric small{
opacity:.6;
font-size:12px;
letter-spacing:.5px;
}

/* SWITCH */

.switch{
display:flex;
gap:10px;
margin-bottom:18px;
align-items:center;
}

.btn{
padding:10px 16px;
border-radius:12px;
background:#1a211d;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
font-size:13px;
}

.btn.active{
background:#d4b06a;
color:#111;
font-weight:600;
}

/* BARS */

.bar{
height:12px;
background:#1a211d;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
background:linear-gradient(90deg,#c26a4a,#d4b06a);
border-radius:20px;
}

/* COMMENTS */

.comment{
border-top:1px solid rgba(255,255,255,.05);
padding-top:12px;
margin-top:12px;
font-size:13px;
line-height:1.5;
opacity:.85;
}

.comment strong{
color:#d4b06a;
}
</style>

</head>

<body>

<div class="container">

<h1>Feedback Insights</h1>

<div class="switch">
<button class="btn active" onclick="setMode('ALL',this)">Overall</button>
<button class="btn" onclick="loadFunciones()">Por función</button>
<select id="funcionSelect" onchange="changeFuncion(this.value)" style="display:none"></select>
</div>

<div id="content"></div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw70JgQJIQqGz45oLxC2iFSqJ7SjQ1BARrp4tW7Go395LNhnarvo__qFBqPky_ga0p9/exec";
const SECRET = "demo123";

let CURRENT = "ALL";

function setMode(mode,btn){
CURRENT = mode;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.getElementById("funcionSelect").style.display = "none";

load();
}

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({action:"funciones",secret:SECRET})
});

const data = await res.json();

const select = document.getElementById("funcionSelect");
select.innerHTML = "";

data.funciones.forEach(f=>{
const opt = document.createElement("option");
opt.value = f;
opt.textContent = f;
select.appendChild(opt);
});

select.style.display = "block";

}

function changeFuncion(f){
CURRENT = f;
load();
}

async function load(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({
action:"feedback_insights",
funcion:CURRENT,
secret:SECRET
})
});

const data = await res.json();

render(data);

}

function render(d){

if(d.empty){
document.getElementById("content").innerHTML = "Sin data";
return;
}

const avg = d.avg;

const dist = d.dist;

document.getElementById("content").innerHTML = `

<div class="card">

<div class="row">

<div class="metric">
<h2>${avg.general.toFixed(1)}</h2>
<small>Experiencia General</small>
</div>

<div class="metric">
<h2>${avg.comida.toFixed(1)}</h2>
<small>Comida</small>
</div>

<div class="metric">
<h2>${avg.servicio.toFixed(1)}</h2>
<small>Servicio</small>
</div>

<div class="metric">
<h2>${avg.tiempo.toFixed(1)}</h2>
<small>Tiempo</small>
</div>

<div class="metric">
<h2>${avg.ambiente.toFixed(1)}</h2>
<small>Ambiente</small>
</div>

</div>

</div>

<div class="card">

<h3 style="margin-bottom:12px">Distribución de experiencia</h3>

${dist.map((v,i)=>{

const percent = (v / d.total) * 100;

return `
<div style="margin-bottom:10px">
<div style="display:flex;justify-content:space-between;font-size:13px">
<span>${i+1}★</span>
<span>${v}</span>
</div>
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
</div>
`;

}).reverse().join("")}

</div>

<div class="card">

<h3>Comentarios recientes</h3>

${d.comentarios.length === 0 ? 
"<div style='opacity:.5'>Sin comentarios aún</div>" :
d.comentarios.map(c=>`
<div class="comment">
<strong>${c.rating}★</strong> — ${c.texto}
</div>
`).join("")}

</div>
`;

}

load();

</script>

</body>
</html>
