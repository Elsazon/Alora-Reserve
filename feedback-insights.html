<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg0:#0e1511;
--bg1:#121a16;
--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);
--terracotta:#c26a4a;
--gold:#bfa15a;
--line:rgba(255,255,255,.08);
}

body{
margin:0;
font-family:Inter;
color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* CARD PRINCIPAL */

.wrapper{
width:700px;
max-width:92%;

background:rgba(255,255,255,.05);
border:1px solid var(--line);
border-radius:28px;
padding:40px;

box-shadow:0 40px 120px rgba(0,0,0,.7);

backdrop-filter:blur(8px);
}

/* HEADER */

.title{
font-family:"Playfair Display",serif;
font-size:28px;
text-align:center;
margin-bottom:6px;
}

.sub{
text-align:center;
font-size:12px;
letter-spacing:2px;
color:var(--muted);
text-transform:uppercase;
margin-bottom:20px;
}

.divider{
width:70px;
height:1px;
background:var(--gold);
margin:14px auto 24px;
opacity:.6;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.btn{
padding:10px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
font-size:13px;
cursor:pointer;
transition:.25s;
}

.btn.active,
.btn:hover{
background:var(--terracotta);
color:#111;
}

/* DONUT */

.chart{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:20px;
}

.donut{
width:170px;
height:170px;
border-radius:50%;
margin-bottom:14px;
transition:1s ease;
}

.score{
font-family:"Playfair Display",serif;
font-size:36px;
color:var(--gold);
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:10px;
}

.metric{
padding:12px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.03);
font-size:13px;
display:flex;
justify-content:space-between;
}

.metric strong{
color:var(--gold);
}

/* DISTRIBUCION */

.section{
margin-top:24px;
}

.section h3{
font-family:"Playfair Display",serif;
margin-bottom:12px;
}

.bar{
height:8px;
background:#1a211d;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
background:linear-gradient(90deg,var(--terracotta),var(--gold));
}

/* COMMENTS */

.comment{
border-top:1px solid var(--line);
padding-top:10px;
margin-top:10px;
font-size:13px;
opacity:.85;
}

.comment strong{
color:var(--gold);
}

</style>

</head>

<body>

<div class="wrapper">

<div class="title">Feedback Insights</div>
<div id="subInfo" class="sub"></div>

<div class="divider"></div>

<div class="switch">
<button class="btn active" onclick="setMode('ALL',this)">Overall</button>
<button class="btn" onclick="loadFunciones()">Por función</button>
<select id="funcionSelect" onchange="changeFuncion(this.value)" style="display:none"></select>
</div>

<div id="content">Cargando...</div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw9wyNvl1Lx9msUYaRgJ48VbnUJWKYsh-AqfkJhZpxaVnK9UE7zCloYmawBxXgz0Yzv/exec";
const SECRET = "demo123";

let CURRENT = "ALL";

function setMode(mode,btn){
CURRENT = mode;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.getElementById("funcionSelect").style.display = "none";

load();
}

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({action:"funciones",secret:SECRET})
});

const data = await res.json();

const select = document.getElementById("funcionSelect");
select.innerHTML = "";

data.funciones.forEach(f=>{
const opt = document.createElement("option");
opt.value = f;
opt.textContent = f;
select.appendChild(opt);
});

select.style.display = "block";
}

function changeFuncion(f){
CURRENT = f;
load();
}

async function load(){

document.getElementById("content").innerHTML = "Cargando...";

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({
action:"feedback_insights",
funcion:CURRENT,
secret:SECRET
})
});

const data = await res.json();

render(data);
}

function render(d){

if(!d.ok){
document.getElementById("content").innerHTML = "Error";
return;
}

if(d.empty){
document.getElementById("content").innerHTML = "Sin data";
return;
}

const label = CURRENT === "ALL" ? "Todas las funciones" : CURRENT;

document.getElementById("subInfo").innerHTML =
`${d.total} respuestas · ${label}`;

const avg = d.avg;
const dist = d.dist;
const total = d.total;

/* DONUT */

let acc = 0;

const colors = [
"#3a1f1a",
"#6a3a2a",
"#a65a3a",
"#c89b5a",
"#bfa15a"
];

let gradient = dist.map((v,i)=>{
const angle = (v/total)*360;
const start = acc;
acc += angle;
return `${colors[i]} ${start}deg ${acc}deg`;
}).join("");

document.getElementById("content").innerHTML = `

<div class="chart">

<div class="donut" id="donut"></div>

<div class="score">${avg.general.toFixed(1)}</div>

</div>

<div class="metrics">

<div class="metric">Comida <strong>${avg.comida.toFixed(1)}</strong></div>
<div class="metric">Servicio <strong>${avg.servicio.toFixed(1)}</strong></div>
<div class="metric">Tiempo <strong>${avg.tiempo.toFixed(1)}</strong></div>
<div class="metric">Ambiente <strong>${avg.ambiente.toFixed(1)}</strong></div>

</div>

<div class="section">

<h3>Distribución</h3>

${dist.map((v,i)=>{

const percent = (v/total)*100;

return `
<div>
${i+1}★ (${v})
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
</div>
`;

}).reverse().join("")}

</div>

<div class="section">

<h3>Comentarios</h3>

${d.comentarios.map(c=>`
<div class="comment">
<strong>${c.rating}★</strong> — ${c.texto}
</div>
`).join("")}

</div>
`;

setTimeout(()=>{
document.getElementById("donut").style.background =
`conic-gradient(${gradient})`;
},100);

}

load();

</script>

</body>
</html>
