<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ALORA · Insights</title>

<style>

:root{
--bg:#0b1210;
--bg2:#0e1613;
--card:#121a16;
--card2:#0e1511;
--gold:#bfa15a;
--gold-soft:#d6c28a;
--accent:#a65a3a;
--text:#f4f1ea;
}

body{
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
font-family:Inter;
margin:0;
padding:26px;
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.container{
max-width:1000px;
margin:auto;
}

h1{
margin:0;
font-weight:500;
letter-spacing:.6px;
}

.sub{
font-size:13px;
opacity:.55;
margin-top:6px;
margin-bottom:20px;
}

/* SWITCH */

.switch{
display:flex;
gap:10px;
margin-bottom:20px;
align-items:center;
}

.btn{
padding:10px 16px;
border-radius:12px;
background:#151c18;
border:1px solid rgba(255,255,255,.06);
cursor:pointer;
font-size:13px;
transition:.2s;
}

.btn:hover{
transform:translateY(-1px);
}

.btn.active{
background:var(--gold);
color:#111;
font-weight:600;
}

/* CARD */

.card{
background:linear-gradient(145deg,var(--card),var(--card2));
border-radius:22px;
padding:24px;
border:1px solid rgba(255,255,255,.05);
margin-bottom:18px;
box-shadow:0 30px 80px rgba(0,0,0,.7);
animation:fadeIn .5s ease;
}

/* METRICS */

.row{
display:flex;
gap:16px;
flex-wrap:wrap;
}

.metric{
flex:1;
min-width:140px;
background:rgba(255,255,255,.02);
padding:16px;
border-radius:14px;
text-align:center;
border:1px solid rgba(255,255,255,.04);
}

.metric h2{
margin:0;
font-size:30px;
color:var(--gold);
}

.metric small{
opacity:.5;
font-size:11px;
letter-spacing:.6px;
text-transform:uppercase;
}

/* DONUT */

.chart{
display:flex;
justify-content:center;
margin:20px 0;
}

.donut{
width:190px;
height:190px;
border-radius:50%;
position:relative;
transition:1s ease;
}

.donut::after{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:120px;
height:120px;
background:var(--card2);
border-radius:50%;
}

.donut-center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.donut-center h2{
margin:0;
font-size:28px;
color:var(--gold);
}

.donut-center span{
font-size:11px;
opacity:.5;
}

/* BARS */

.bar{
height:10px;
background:#161d19;
border-radius:20px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
background:linear-gradient(90deg,var(--accent),var(--gold));
border-radius:20px;
transition:1s ease;
}

/* COMMENTS */

.comment{
border-top:1px solid rgba(255,255,255,.04);
padding-top:12px;
margin-top:12px;
font-size:13px;
line-height:1.5;
opacity:.85;
}

.comment strong{
color:var(--gold);
}

/* LOADING */

.loading{
opacity:.4;
text-align:center;
padding:40px;
}

</style>

</head>

<body>

<div class="container">

<h1>Feedback Insights</h1>
<div id="subInfo" class="sub"></div>

<div class="switch">
<button class="btn active" onclick="setMode('ALL',this)">Overall</button>
<button class="btn" onclick="loadFunciones()">Por función</button>
<select id="funcionSelect" onchange="changeFuncion(this.value)" style="display:none"></select>
</div>

<div id="content" class="loading">Cargando insights...</div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw9wyNvl1Lx9msUYaRgJ48VbnUJWKYsh-AqfkJhZpxaVnK9UE7zCloYmawBxXgz0Yzv/exec";
const SECRET = "demo123";

let CURRENT = "ALL";

function setMode(mode,btn){
CURRENT = mode;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.getElementById("funcionSelect").style.display = "none";

load();
}

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({action:"funciones",secret:SECRET})
});

const data = await res.json();

const select = document.getElementById("funcionSelect");
select.innerHTML = "";

data.funciones.forEach(f=>{
const opt = document.createElement("option");
opt.value = f;
opt.textContent = f;
select.appendChild(opt);
});

select.style.display = "block";

}

function changeFuncion(f){
CURRENT = f;
load();
}

async function load(){

document.getElementById("content").innerHTML =
"<div class='loading'>Cargando insights...</div>";

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({
action:"feedback_insights",
funcion:CURRENT,
secret:SECRET
})
});

const data = await res.json();

render(data);

}

function render(d){

if(!d.ok){
document.getElementById("content").innerHTML = "Error backend";
return;
}

if(d.empty){
document.getElementById("content").innerHTML = "Sin data aún";
return;
}

const label = CURRENT === "ALL" ? "Todas las funciones" : CURRENT;

document.getElementById("subInfo").innerHTML =
`${d.total} respuestas · ${label}`;

const avg = d.avg;
const dist = d.dist;
const total = d.total;

/* DONUT */

let acc = 0;

const colors = [
"#3a1f1a",
"#6a3a2a",
"#a65a3a",
"#c89b5a",
"#bfa15a"
];

let gradient = dist.map((v,i)=>{
const angle = (v/total)*360;
const start = acc;
acc += angle;
return `${colors[i]} ${start}deg ${acc}deg`;
}).join(",");

/* HTML */

document.getElementById("content").innerHTML = `

<div class="card">

<div class="chart">

<div class="donut" id="donut"></div>

<div class="donut-center">
<h2>${avg.general.toFixed(1)}</h2>
<span>Score</span>
</div>

</div>

</div>

<div class="card">

<div class="row">

<div class="metric"><h2>${avg.comida.toFixed(1)}</h2><small>Comida</small></div>
<div class="metric"><h2>${avg.servicio.toFixed(1)}</h2><small>Servicio</small></div>
<div class="metric"><h2>${avg.tiempo.toFixed(1)}</h2><small>Tiempo</small></div>
<div class="metric"><h2>${avg.ambiente.toFixed(1)}</h2><small>Ambiente</small></div>

</div>

</div>

<div class="card">

<h3>Distribución</h3>

${dist.map((v,i)=>{

const percent = (v / total) * 100;

return `
<div style="margin-bottom:10px">
<div style="display:flex;justify-content:space-between;font-size:13px">
<span>${i+1}★</span>
<span>${v}</span>
</div>
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
</div>
`;

}).reverse().join("")}

</div>

<div class="card">

<h3>Comentarios</h3>

${d.comentarios.map(c=>`
<div class="comment">
<strong>${c.rating}★</strong> — ${c.texto}
</div>
`).join("")}

</div>
`;

/* ANIMAR DONUT */

setTimeout(()=>{
document.getElementById("donut").style.background =
`conic-gradient(${gradient})`;
},200);

}

load();

</script>

</body>
</html>
