<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg0:#0e1511;
--bg1:#121a16;
--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);
--terracotta:#c26a4a;
--gold:#bfa15a;
--line:rgba(255,255,255,.08);
}

body{
margin:0;
font-family:Inter;
color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:600px;
max-width:92%;

background:rgba(255,255,255,.05);
border:1px solid var(--line);
border-radius:28px;
padding:40px;

box-shadow:0 40px 120px rgba(0,0,0,.7);
backdrop-filter:blur(8px);
text-align:center;
}

/* HEADER */

.title{
font-family:"Playfair Display",serif;
font-size:28px;
}

.sub{
font-size:12px;
letter-spacing:2px;
color:var(--muted);
margin-top:6px;
text-transform:uppercase;
}

.divider{
width:70px;
height:1px;
background:var(--gold);
margin:18px auto;
opacity:.6;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:18px;
}

.btn{
padding:10px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
cursor:pointer;
font-size:13px;
transition:.25s;
}

.btn.active,
.btn:hover{
background:var(--terracotta);
color:#111;
}

/* DROPDOWN CUSTOM */

.dropdown{
position:relative;
display:inline-block;
}

.dropdownBtn{
padding:10px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
cursor:pointer;
font-size:13px;
}

.dropdownMenu{
position:absolute;
top:120%;
left:0;
width:100%;
background:#121a16;
border:1px solid var(--line);
border-radius:12px;
overflow:hidden;
display:none;
z-index:10;
}

.dropdownItem{
padding:10px;
cursor:pointer;
font-size:13px;
border-bottom:1px solid var(--line);
}

.dropdownItem:hover{
background:rgba(255,255,255,.05);
}

/* DONUT */

.donut{
width:160px;
height:160px;
border-radius:50%;
margin:20px auto;
transition:1s;
}

.score{
font-family:"Playfair Display",serif;
font-size:36px;
color:var(--gold);
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.metric{
padding:12px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.03);
display:flex;
justify-content:space-between;
font-size:13px;
}

.metric strong{
color:var(--gold);
}

</style>

</head>

<body>

<div class="wrapper">

<div class="title">Feedback Insights</div>
<div id="subInfo" class="sub"></div>

<div class="divider"></div>

<div class="switch">
<button class="btn active" onclick="setMode('ALL',this)">Overall</button>

<div class="dropdown">
<div class="dropdownBtn" onclick="toggleDropdown()">Por función</div>
<div id="menu" class="dropdownMenu"></div>
</div>

</div>

<div id="content">Cargando...</div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw9wyNvl1Lx9msUYaRgJ48VbnUJWKYsh-AqfkJhZpxaVnK9UE7zCloYmawBxXgz0Yzv/exec";
const SECRET = "demo123";

let CURRENT = "ALL";

/* DROPDOWN */

function toggleDropdown(){
const menu = document.getElementById("menu");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({action:"funciones",secret:SECRET})
});

const data = await res.json();

const menu = document.getElementById("menu");
menu.innerHTML = "";

data.funciones.forEach(f=>{
const div = document.createElement("div");
div.className = "dropdownItem";
div.textContent = f;
div.onclick = ()=>{
CURRENT = f;
menu.style.display="none";
load();
};
menu.appendChild(div);
});

}

/* MODE */

function setMode(mode,btn){
CURRENT = mode;

document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

load();
}

/* LOAD */

async function load(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({
action:"feedback_insights",
funcion:CURRENT,
secret:SECRET
})
});

const data = await res.json();
render(data);

}

/* RENDER */

function render(d){

if(!d.ok || d.empty){
document.getElementById("content").innerHTML = "Sin data";
return;
}

const total = d.total || 1;

document.getElementById("subInfo").innerHTML =
`${d.total} respuestas · ${CURRENT==="ALL"?"General":CURRENT}`;

const avg = d.avg;
const dist = d.dist;

/* DONUT */

let acc = 0;

const colors = [
"#3a1f1a",
"#6a3a2a",
"#a65a3a",
"#c89b5a",
"#bfa15a"
];

let gradient = dist.map((v,i)=>{
const angle = (v/total)*360;
const start = acc;
acc += angle;
return `${colors[i]} ${start}deg ${acc}deg`;
}).join(",");

/* HTML */

document.getElementById("content").innerHTML = `

<div class="donut" id="donut"></div>
<div class="score">${avg.general.toFixed(1)}</div>

<div class="metrics">

<div class="metric">Comida <strong>${avg.comida.toFixed(1)}</strong></div>
<div class="metric">Servicio <strong>${avg.servicio.toFixed(1)}</strong></div>
<div class="metric">Tiempo <strong>${avg.tiempo.toFixed(1)}</strong></div>
<div class="metric">Ambiente <strong>${avg.ambiente.toFixed(1)}</strong></div>

</div>
`;

setTimeout(()=>{
document.getElementById("donut").style.background =
`conic-gradient(${gradient})`;
},100);

}

/* INIT */

load();
loadFunciones();

</script>

</body>
</html>
