<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ALORA · Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg0:#0e1511;
--bg1:#121a16;
--ink:#f4f1ea;
--muted:rgba(244,241,234,.65);
--terracotta:#c26a4a;
--gold:#bfa15a;
--line:rgba(255,255,255,.08);
}

body{
margin:0;
font-family:Inter;
color:var(--ink);

background:
radial-gradient(900px 600px at 15% 10%, rgba(194,106,74,.10), transparent 60%),
radial-gradient(1000px 700px at 85% 20%, rgba(79,81,56,.15), transparent 60%),
linear-gradient(180deg,var(--bg0),var(--bg1));

display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.wrapper{
width:680px;
max-width:92%;
background:rgba(255,255,255,.05);
border:1px solid var(--line);
border-radius:28px;
padding:40px;
box-shadow:0 40px 120px rgba(0,0,0,.7);
backdrop-filter:blur(8px);
}

/* HEADER */

.title{
font-family:"Playfair Display",serif;
font-size:30px;
text-align:center;
}

.sub{
text-align:center;
font-size:12px;
letter-spacing:2px;
color:var(--muted);
text-transform:uppercase;
margin-top:6px;
}

.divider{
width:70px;
height:1px;
background:var(--gold);
margin:18px auto;
opacity:.6;
}

/* SWITCH */

.switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.btn{
padding:10px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
cursor:pointer;
font-size:13px;
transition:.25s;
}

.btn.active,
.btn:hover{
background:var(--terracotta);
color:#111;
}

/* DROPDOWN */

.dropdown{
position:relative;
}

.dropdownBtn{
padding:10px 18px;
border-radius:14px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.12);
cursor:pointer;
}

.dropdownMenu{
position:absolute;
top:120%;
left:0;
background:#121a16;
border:1px solid var(--line);
border-radius:12px;
display:none;
overflow:hidden;
z-index:10;
min-width:180px;
}

.dropdownItem{
padding:10px 14px;
cursor:pointer;
border-bottom:1px solid var(--line);
font-size:13px;
}

.dropdownItem:hover{
background:rgba(255,255,255,.05);
}

/* DONUT */

.chart{
text-align:center;
margin-bottom:10px;
}

.donut{
width:170px;
height:170px;
border-radius:50%;
margin:10px auto;
transition:1s;
}

.score{
font-family:"Playfair Display",serif;
font-size:38px;
color:var(--gold);
}

.scoreLabel{
font-size:12px;
opacity:.6;
margin-top:4px;
}

/* INSIGHT */

.insight{
margin-top:14px;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.03);
border:1px solid var(--line);
font-size:13px;
line-height:1.6;
text-align:center;
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px;
}

.metric{
padding:12px;
border-radius:12px;
border:1px solid var(--line);
background:rgba(255,255,255,.03);
display:flex;
justify-content:space-between;
font-size:13px;
}

.metric strong{
color:var(--gold);
}

/* TOP ISSUE */

.topIssue{
margin-top:10px;
text-align:center;
font-size:13px;
color:var(--terracotta);
}

/* DISTRIBUCION */

.section{
margin-top:24px;
}

.bar{
height:8px;
background:#1a211d;
border-radius:10px;
overflow:hidden;
margin-top:4px;
}

.fill{
height:100%;
background:linear-gradient(90deg,var(--terracotta),var(--gold));
}

/* COMMENTS */

.comment{
border-top:1px solid var(--line);
padding-top:10px;
margin-top:10px;
font-size:13px;
opacity:.85;
}

.comment strong{
color:var(--gold);
}

.empty{
text-align:center;
opacity:.6;
padding:40px;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="title">Feedback Insights</div>
<div id="subInfo" class="sub"></div>

<div class="divider"></div>

<div class="switch">
<button class="btn active" onclick="setMode('ALL',this)">Overall</button>

<div class="dropdown">
<div class="dropdownBtn" onclick="toggleDropdown()">Por función</div>
<div id="menu" class="dropdownMenu"></div>
</div>
</div>

<div id="content">Cargando...</div>

</div>

<script>

const BACKEND_URL = "https://script.google.com/macros/s/AKfycbw9wyNvl1Lx9msUYaRgJ48VbnUJWKYsh-AqfkJhZpxaVnK9UE7zCloYmawBxXgz0Yzv/exec";
const SECRET = "demo123";

let CURRENT = "ALL";

/* DROPDOWN */

function toggleDropdown(){
const m = document.getElementById("menu");
m.style.display = m.style.display==="block"?"none":"block";
}

async function loadFunciones(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({action:"funciones",secret:SECRET})
});

const data = await res.json();

const menu = document.getElementById("menu");
menu.innerHTML = "";

data.funciones.forEach(f=>{
const div = document.createElement("div");
div.className="dropdownItem";
div.textContent=f;
div.onclick=()=>{
CURRENT=f;
menu.style.display="none";
load();
};
menu.appendChild(div);
});
}

/* MODE */

function setMode(mode,btn){
CURRENT=mode;
document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
load();
}

/* LOAD */

async function load(){

const res = await fetch(BACKEND_URL,{
method:"POST",
body:JSON.stringify({
action:"feedback_insights",
funcion:CURRENT,
secret:SECRET
})
});

const data = await res.json();
render(data);
}

/* RENDER */

function render(d){

if(!d.ok || d.empty){
document.getElementById("content").innerHTML=`
<div class="empty">
No hay feedback disponible aún para esta selección.
</div>
`;
return;
}

const total = d.total || 1;

document.getElementById("subInfo").innerHTML =
`${d.total} evaluaciones registradas · ${CURRENT==="ALL"?"Vista general":CURRENT}`;

const avg=d.avg;
const dist=d.dist;

/* DONUT */

let acc=0;
const colors=["#3a1f1a","#6a3a2a","#a65a3a","#c89b5a","#bfa15a"];

let gradient=dist.map((v,i)=>{
const angle=(v/total)*360;
const start=acc;
acc+=angle;
return `${colors[i]} ${start}deg ${acc}deg`;
}).join(",");

/* COLOR SCORE */

const scoreColor =
avg.general >= 4.5 ? "#bfa15a" :
avg.general >= 4 ? "#c89b5a" :
avg.general >= 3 ? "#a65a3a" :
"#6a3a2a";

/* INSIGHT */

let insight = "";

if(avg.general >= 4.5){
insight = "Excelente experiencia. Mantener estándar actual.";
}else if(avg.servicio < 4){
insight = "El servicio está impactando la experiencia.";
}else if(avg.tiempo < 4){
insight = "El tiempo de servicio necesita optimización.";
}else if(avg.comida < 4){
insight = "La comida no está cumpliendo expectativas.";
}else{
insight = "Experiencia sólida con oportunidades de mejora.";
}

/* TOP ISSUE */

const areas = [
{name:"Comida", val:avg.comida},
{name:"Servicio", val:avg.servicio},
{name:"Tiempo", val:avg.tiempo},
{name:"Ambiente", val:avg.ambiente}
];

areas.sort((a,b)=>a.val-b.val);

/* HTML */

document.getElementById("content").innerHTML=`

<div class="chart">

<div class="donut" id="donut"></div>

<div class="score" style="color:${scoreColor}">
${avg.general.toFixed(1)}
</div>

<div class="scoreLabel">
Experiencia general
</div>

<div class="insight">
${insight}
</div>

</div>

<div class="metrics">

<div class="metric">Comida <strong>${avg.comida.toFixed(1)}</strong></div>
<div class="metric">Servicio <strong>${avg.servicio.toFixed(1)}</strong></div>
<div class="metric">Tiempo <strong>${avg.tiempo.toFixed(1)}</strong></div>
<div class="metric">Ambiente <strong>${avg.ambiente.toFixed(1)}</strong></div>

</div>

<div class="topIssue">
Área a mejorar: ${areas[0].name}
</div>

<div class="section">

<h3>Distribución</h3>

${dist.map((v,i)=>{

const percent=(v/total)*100;

return `
<div>
${i+1}★ (${v})
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>
</div>
`;

}).reverse().join("")}

</div>

<div class="section">

<h3>Comentarios</h3>

${d.comentarios.length === 0
? `<div class="empty">Sin comentarios aún</div>`
: d.comentarios.map(c=>`
<div class="comment">
<strong>${c.rating}★</strong> — ${c.texto}
</div>
`).join("")}

</div>
`;

setTimeout(()=>{
document.getElementById("donut").style.background=
`conic-gradient(${gradient})`;
},100);

}

/* INIT */

load();
loadFunciones();

</script>

</body>
</html>
